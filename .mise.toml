[tools]
opentofu = "latest"
python = "3.11"
trivy = "latest"
java = "21"

[tasks.export-requirements]
description = "Create requirements.txt from lock file"
run = "uv export -o requirements.txt --no-dev"

[tasks.dev]
description = "Run dev server"
run = "python app.py"

[tasks.build]
description = "Build Docker image"
run = "docker build --platform linux/amd64 -t ps-4feb ."

[tasks.purge]
description = "Stop and remove container, then remove image"
run = """
docker stop ps-4feb-container 2>/dev/null || true
docker rm ps-4feb-container 2>/dev/null || true
docker rmi ps-4feb 2>/dev/null || true
"""

[tasks.run-doc]
description = "Run container"
run = "docker run --rm -it --name ps-4feb-container -p 8877:8877 -v $(pwd)/.key.json:/app/.key.json:ro -e GOOGLE_APPLICATION_CREDENTIALS=/app/.key.json ps-4feb"

[tasks.deploy]
description = "Deploy to Cloud Run"
run = """
# Authenticate with service account and set project
gcloud auth activate-service-account --key-file=.key.json --project=edsy-ps-proj
PROJECT_ID="edsy-ps-proj"
REGION="us-central1"
IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/ps-4feb-repo/ps-4feb:latest"

# Configure docker auth for registry
gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

# Build and tag for linux/amd64 (Cloud Run requires amd64)
docker build --platform linux/amd64 -t ps-4feb .
docker tag ps-4feb ${IMAGE}

# Push to registry
docker push ${IMAGE}

# Deploy to Cloud Run with service account (gives container Pub/Sub access)
gcloud run deploy ps-4feb-service \
  --project=${PROJECT_ID} \
  --image=${IMAGE} \
  --region=${REGION} \
  --allow-unauthenticated \
  --port=8877 \
  --timeout=3600 \
  --memory=512Mi \
  --min-instances=0

echo "Deployed! URL:"
gcloud run services describe ps-4feb-service --project=${PROJECT_ID} --region=${REGION} --format='value(status.url)'
"""

[tasks.setup-registry]
description = "Setup Artifact Registry (run once)"
run = """
gcloud auth activate-service-account --key-file=.key.json
PROJECT_ID="edsy-ps-proj"
REGION="us-central1"
gcloud artifacts repositories create ps-4feb-repo \
  --repository-format=docker \
  --location=${REGION} \
  --description="Docker repository for ps-4feb"
gcloud auth configure-docker ${REGION}-docker.pkg.dev
"""
